name: Neon -> Firestore Price Sync

# Runs from THIS repo (public) instead of the main app repo (private) so
# GitHub Actions minutes are free regardless of how often this fires.
# The scripts here are a copy of bemnamosca_db/scripts/sync-neon-*.cjs —
# keep them in sync if the sync logic changes there.
#
# HIGH-VALUE ONLY: this always runs scripts/sync-neon-high-value.cjs, never
# the full-catalog cursor script (sync-neon-to-firestore.cjs). It finds
# every barcode priced >= MIN_VALUE anywhere (scripts/sync-config.cjs) and
# cross-checks it against every store, so expensive items always have a
# fresh cross-store price comparison. The full-catalog script still exists
# for a manual/local run (`npm run sync:neon:apply` in bemnamosca_db) if you
# want the rest of the catalog synced too — it's just not part of this
# automatic schedule.
#
# Scheduled every 4h, offset to land right after the scraper waves:
# the 8h-cycle stores (drogasil 40 */8, ultrafarma 45 */8, drogaraia
# 50 */8) take 60-90 min, so their fresh data is ready ~2:15/10:15/18:15
# UTC; the 4h-cycle stores finish within ~30 min of their marks. Running
# at :30 past 2/6/10/14/18/22 catches every wave shortly after it lands.
# Worst-case budget: 6 runs x 1000 writes = 6k/day (30% of the 20k free
# quota); the dynamic write-budget guard inside the script caps each run
# against the day's actual remaining headroom on top of that.
# Manual runs are also available (Actions tab -> Run workflow) for
# ad-hoc testing without waiting for the schedule.
on:
  schedule:
    - cron: '30 2,6,10,14,18,22 * * *'
  workflow_dispatch:
    inputs:
      apply:
        description: Apply writes to Firestore (false = dry-run, safe to test)
        required: true
        default: false
        type: boolean
      barcode:
        description: Sync exactly one barcode across every store (blank = MIN_VALUE discovery across all stores)
        required: false
        default: ''
        type: string
      max_writes:
        description: Override maxWritesPerRun for this run (blank = use scripts/sync-config.cjs default)
        required: false
        default: ''
        type: string

# contents:write is required — this job commits the updated mirror state
# (mirror/*.json + state/cursor.json) back to THIS repo after every run.
permissions:
  contents: write

# Every NEON_DATABASE_URL_<CHAIN> secret referenced here is optional — a
# chain whose secret isn't set yet just resolves to an empty string, and
# scripts/sync-neon-high-value.cjs already skips any store with no
# configured connection string. New chain? Add its secret AND a line here.
env:
  NEON_DATABASE_URL_DROGALESTE: ${{ secrets.NEON_DATABASE_URL_DROGALESTE }}
  NEON_DATABASE_URL_DROGASIL: ${{ secrets.NEON_DATABASE_URL_DROGASIL }}
  NEON_DATABASE_URL_DROGARAIA: ${{ secrets.NEON_DATABASE_URL_DROGARAIA }}
  NEON_DATABASE_URL_DROGARIASAOPAULO: ${{ secrets.NEON_DATABASE_URL_DROGARIASAOPAULO }}
  NEON_DATABASE_URL_ULTRAFARMA: ${{ secrets.NEON_DATABASE_URL_ULTRAFARMA }}
  NEON_DATABASE_URL_PAGUEMENOS: ${{ secrets.NEON_DATABASE_URL_PAGUEMENOS }}
  NEON_DATABASE_URL_FARMAIS: ${{ secrets.NEON_DATABASE_URL_FARMAIS }}
  NEON_DATABASE_URL_PANVEL: ${{ secrets.NEON_DATABASE_URL_PANVEL }}
  NEON_DATABASE_URL_FARMACIASAPP: ${{ secrets.NEON_DATABASE_URL_FARMACIASAPP }}
  NEON_DATABASE_URL_FARMACONDE: ${{ secrets.NEON_DATABASE_URL_FARMACONDE }}

jobs:
  sync-neon:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # persist-credentials (default: true) leaves the GITHUB_TOKEN wired
        # into this checkout's git config, so the later `git push` (done by
        # scripts/lib/syncMirror.cjs's commitAndPush) authenticates without
        # any extra secret — no PAT needed since we're pushing to this same
        # repo, not cloning a separate one.

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity for mirror commits
        run: |
          git config user.email "sync@bem-na-mosca.app"
          git config user.name "Bem na Mosca Sync"
          git checkout -B main
          git branch --set-upstream-to=origin/main main || true

      - name: Prepare Firebase service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing secret: FIREBASE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          printf "%s" "$FIREBASE_SERVICE_ACCOUNT_JSON" > service-account.ci.json

      - name: Run high-value sync
        shell: bash
        run: |
          MODE="--dry-run"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.apply }}" = "true" ]; then
            MODE="--apply"
          fi

          BARCODE_ARG=()
          if [ -n "${{ inputs.barcode }}" ]; then
            BARCODE_ARG=(--barcode "${{ inputs.barcode }}")
          fi
          MAX_WRITES_ARG=()
          if [ -n "${{ inputs.max_writes }}" ]; then
            MAX_WRITES_ARG=(--max-writes "${{ inputs.max_writes }}")
          fi

          node scripts/sync-neon-high-value.cjs \
            $MODE "${BARCODE_ARG[@]}" "${MAX_WRITES_ARG[@]}" \
            --service-account ./service-account.ci.json \
            --project-id "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
